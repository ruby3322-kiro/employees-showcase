<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊中国客服中心 - 优秀员工展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="background">
        <div class="stars"></div>
        <div class="waves"></div>
    </div>

    <div class="container">
        <!-- 标题区域 -->
        <header class="header">
            <h1>亚马逊中国客服中心</h1>
            <p class="subtitle">优秀员工展示</p>
        </header>

        <!-- 奖杯装饰 -->
        <div class="trophy-section">
            <div class="trophy">
                <div class="trophy-star"></div>
                <div class="trophy-cup"></div>
            </div>
        </div>

        <!-- 员工网格展示 -->
        <section class="employees-section">
            <div class="employees-grid" id="employeesGrid">
                <!-- 员工卡片会由 JavaScript 动态生成 -->
            </div>
        </section>

        <!-- 底部统计 -->
        <footer class="footer">
            <p>团队规模: <span id="totalEmployees">100</span> 人</p>
            <p>© 2026 亚马逊中国客服中心</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
